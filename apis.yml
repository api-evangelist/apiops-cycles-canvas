aid: apiops-cycles-canvas
name: APIOps Cycles Canvas
description: >-
  APIOps Cycles Canvases are structured workshop tools for API strategy,
  design, and business modeling. The collection includes 10 canvas types
  covering API business models, value propositions, capacity planning,
  customer journeys, domain design, event modeling, interaction design,
  location analysis, and REST API design, enabling teams to collaborate
  and align on API decisions using visual canvas methodologies.
